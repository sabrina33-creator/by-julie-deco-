<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&amp;display=swap');
    </style>
  </defs>
  <!-- Direction A: Signature élégante -->
  <rect width="400" height="160" fill="white"/>
  
  <!-- "by" en italique or -->
  <text x="200" y="55" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="18" 
        font-style="italic"
        font-weight="300"
        fill="#C9A84C" 
        text-anchor="middle"
        letter-spacing="6">by</text>
  
  <!-- Ligne décorative fine or -->
  <line x1="90" y1="65" x2="155" y2="65" stroke="#C9A84C" stroke-width="0.5"/>
  <line x1="245" y1="65" x2="310" y2="65" stroke="#C9A84C" stroke-width="0.5"/>
  
  <!-- "JULIE DÉCO" en sérif majuscules -->
  <text x="200" y="105" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="38" 
        font-weight="300"
        fill="#0a0a0a" 
        text-anchor="middle"
        letter-spacing="8">JULIE DÉCO</text>
        
  <!-- Ligne décorative fine noire en bas -->
  <line x1="120" y1="118" x2="280" y2="118" stroke="#0a0a0a" stroke-width="0.5"/>
</svg>
