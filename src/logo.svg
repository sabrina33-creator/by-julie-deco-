<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g2" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#7A8B6F"/>
      <stop offset="100%" stop-color="#4A5C45"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#g2)"/>
  <!-- Subtle inner border for depth -->
  <rect width="100" height="100" rx="22" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Key icon — vertical, geometric -->

  <!-- Ring outer -->
  <circle cx="50" cy="34" r="14" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="4.5"/>
  <!-- Ring inner hole -->
  <circle cx="50" cy="34" r="3.8" fill="rgba(255,255,255,0.92)"/>

  <!-- Stem -->
  <rect x="47.5" y="47" width="5" height="25" rx="2.5" fill="rgba(255,255,255,0.92)"/>

  <!-- Tooth 1 -->
  <rect x="52.5" y="57.5" width="9" height="3.5" rx="1.75" fill="rgba(255,255,255,0.92)"/>
  <!-- Tooth 2 -->
  <rect x="52.5" y="65" width="7" height="3.5" rx="1.75" fill="rgba(255,255,255,0.92)"/>
</svg>
