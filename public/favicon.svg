<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#ffffff"/>

  <!-- "by" italique or petit -->
  <text x="150" y="100"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        font-style="italic"
        font-weight="300"
        fill="#C9A84C"
        text-anchor="middle"
        letter-spacing="8">by</text>

  <!-- Ligne fine or -->
  <line x1="60" y1="112" x2="240" y2="112" stroke="#C9A84C" stroke-width="0.5"/>

  <!-- "JULIE" noir -->
  <text x="150" y="175"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48"
        font-weight="300"
        fill="#0a0a0a"
        text-anchor="middle"
        letter-spacing="10">JULIE</text>

  <!-- "DÉCO" or -->
  <text x="150" y="222"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="300"
        fill="#C9A84C"
        text-anchor="middle"
        letter-spacing="12">DÉCO</text>

  <!-- Ligne fine or bas -->
  <line x1="60" y1="235" x2="240" y2="235" stroke="#C9A84C" stroke-width="0.5"/>
</svg>
