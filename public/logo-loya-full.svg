<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 100" width="740" height="200">
  <defs>
    <linearGradient id="g" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#7A8B6F"/>
      <stop offset="100%" stop-color="#4A5C45"/>
    </linearGradient>
  </defs>

  <!-- White background for PNG export -->
  <rect width="370" height="100" fill="#FAFAF5"/>

  <!-- Icon 90×90 centered vertically -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#g)"/>
  <rect x="5" y="5" width="90" height="90" rx="20" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1.5"/>

  <!-- Key ring -->
  <circle cx="50" cy="35.6" r="12.6" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="4"/>
  <circle cx="50" cy="35.6" r="3.4" fill="rgba(255,255,255,0.92)"/>
  <!-- Key stem -->
  <rect x="47.75" y="47.3" width="4.5" height="22.5" rx="2.25" fill="rgba(255,255,255,0.92)"/>
  <!-- Teeth -->
  <rect x="52.25" y="56.5" width="8" height="3.2" rx="1.6" fill="rgba(255,255,255,0.92)"/>
  <rect x="52.25" y="63.3" width="6.3" height="3.2" rx="1.6" fill="rgba(255,255,255,0.92)"/>

  <!-- Vertical separator line -->
  <line x1="112" y1="18" x2="112" y2="82" stroke="#DDD5C8" stroke-width="1"/>

  <!-- "Loya" wordmark -->
  <text x="127" y="57"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="42"
    fill="#2C2C2C"
    letter-spacing="-1">Loya</text>

  <!-- Tagline -->
  <text x="129" y="75"
    font-family="'Arial Narrow', Arial, sans-serif"
    font-size="11"
    font-weight="600"
    fill="#7A8B6F"
    letter-spacing="3.2">CONCIERGERIE · BORDEAUX</text>
</svg>
